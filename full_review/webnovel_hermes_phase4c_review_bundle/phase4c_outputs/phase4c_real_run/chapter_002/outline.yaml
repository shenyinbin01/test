  location: 望江路18号
  purpose: 尝试筹集资金，发现线索
- order: 3
  title: 标签暴跌对应危险
  location: 公寓地下室
  purpose: 发现标签与现实危险的关联
- order: 4
  title: 代价浮现
  location: 路上
