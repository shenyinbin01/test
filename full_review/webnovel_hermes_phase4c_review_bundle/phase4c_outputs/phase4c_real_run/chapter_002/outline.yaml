chapter: 2
title: 误判代价
goal: 林砚发现价格不是财富，尝试通过标签筹钱，选择代价浮现，回收费城客户线索，标签暴跌对应现实危险
must_include:
- 父亲仍病重存活
- 医院缴费窗口承接
- 林砚急需筹钱
- 林砚误解被动摇
- 选择代价浮现
- 能力副作用
- 光鲜客户线索回收
- 新钩子
scenes:
