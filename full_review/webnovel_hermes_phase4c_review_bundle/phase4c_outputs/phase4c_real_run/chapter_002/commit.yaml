chapter_id: 2
title: 误判代价
summary: 林砚发现父亲头顶价格归零后变为空白，通过再次送餐到光鲜客户地址发现其经济诈骗案发，确认标签能预警危险。他获得一张风险评估师名片并拜访老人，但老人未给出答案。林砚回到医院，父亲病情恶化，电话接通后对方告知时间不多。
confirmed_events:
  - 林砚在医院走廊再次使用能力，确认中年男人头顶标签为五位数且稳定，能力未消失
  - 林砚接单前往望江路，发现光鲜客户所在公寓楼被警方封锁，涉案经济诈骗金额达八位数
  - 林砚通过时间比对确认标签暴跌发生在诈骗暴露前约四分钟，推断标签能预警危险
  - 林砚收到一条来自未显示号码的短信“你看见了对吧”，回拨后关机
  - 林砚潜入地下停车场，看见一个穿西装的中年男人，其头顶标签为七位数且边缘闪烁红光
  - 林砚因强行使用能力导致短暂失明和耳鸣，恢复后发现地上掉落一张“方迟”名片，背面有槐安路17号地址
  - 林砚前往槐安路，遇到老人，老人用“两块钱的葱”比喻林砚对标签的理解，并说“眼神太好不是好事”
  - 林砚返回医院，父亲头顶依然空白，他拨打名片电话接通后听到女声“你终于打来了”
  - 林砚父亲心率急剧下降，护士准备抢救，电话中女声说“你父亲的时间不多了”
character_updates:
  - character: 林砚
    change: 对标签的理解从“财富指标”推进到“危险预警”，但仍是误解；意识到能力使用有副作用（头痛、短暂失明）；开始主动调查能力来源，联系风险评估师
  - character: 林父
    change: 病重住院，头顶价格归零后变为空白，心率下降，正在抢救中，仍然存活
  - character: 老人
    change: 出现在槐安路，知道林砚能看到标签，但拒绝解释，暗示林砚理解有误
ability_rule_updates:
  - 林砚确认标签不是财富指标，光鲜客户暴跌发生在经济诈骗暴露前，推测标签能预警危险或风险
  - 林砚发现父亲头顶价格归零后变为彻底空白，与其他人的标签表现不同
  - 林砚确认强行使用能力会导致头痛、短暂失明和耳鸣，需要恢复时间
