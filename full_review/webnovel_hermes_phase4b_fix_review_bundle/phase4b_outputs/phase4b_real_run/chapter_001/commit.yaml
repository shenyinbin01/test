chapter_id: 1
title: 价格初现
summary: 外卖员林砚在送餐途中突然看见老人头顶异常高的价格标签，随后又目睹光鲜客户价格快速下跌，误以为标签代表财富。试图接近老人未果后，他在医院缴费窗口发现父亲头顶价格正在归零，最终彻底消失。
confirmed_events:
  - 林砚在老旧小区六楼走廊看见一个穿旧夹克的老人头顶悬着六位数的淡金色数字
  - 林砚揉眼确认数字存在，试图看清时感到太阳穴刺痛
  - 老人平静地看了林砚一眼，没有多言
  - 林砚送第二单到高档公寓，开门的光鲜客户头顶有五位数价格且正在快速下跌
  - 客户挂断电话后脸色铁青地接过餐盒
  - 林砚误以为价格标签代表财富，判断老人是隐形富豪、客户正在破产
  - 林砚改变路线返回老旧小区，在水果摊前看到老人为三毛六讨价还价
  - 林砚主动搭讪老人，老人回应“年轻人，眼神太好有时候不是好事”后离开
  - 林砚收到医院催缴短信，赶到第三人民医院缴费窗口
  - 林砚余额不足五千一，差三千一，护士告知欠费三天将停药
  - 林砚在病房门口看见病床上父亲头顶价格正在变淡、碎裂、消失
  - 父亲头顶数字从五位数降至零，最后一位数字闪烁后彻底熄灭，只剩空白
character_updates:
  - character: 林砚
    change: 首次看见人生价格标签，误以为代表财富，对能力产生困惑与不安；经济压力达到临界点，父亲医疗费缺口三千一
  - character: 林父
    change: 病重住院，价格归零但仍然存活，呼吸机维持生命
  - character: 老人
    change: 首次出现，穿着破旧但头顶价格异常高，对林砚的视线有所察觉并给出模糊警告
  - character: 光鲜客户
    change: 外表光鲜但头顶价格快速下跌，电话中透露资金周转问题，情绪暴躁
ability_rule_updates:
  - 林砚发现价格标签只在特定光线下清晰可见（走廊斜阳、病房日光灯）
  - 林砚试图集中注意力看清时感到太阳穴刺痛
  - 林砚误以为标签数字代表个人财富或身价
  - 价格标签会从边缘开始碎裂消失，而非单纯数字跳动下降
open_threads_updates:
  - thread_id: father_price_near_zero
    status: open
    note: 父亲价格归零但未死亡，标签机制与生命的关系仍不明
  - thread_id: old_man_identity
    status: open
    note: 老人身份和真实价值来源未揭示
  - thread_id: polished_customer_falling_price
    status: open
    note: 客户价格下跌原因和后续发展未揭示
  - thread_id: label_meaning_unknown
    status: open
    note: 标签真实含义仍为悬疑，林砚的财富误判已被证伪（老人讨价还价）
continuity_notes: 第二章需要承接父亲价格归零后的紧张局面——林砚如何面对医疗费缺口、是否再次使用能力寻找机会、对价格标签的认知从财富误判转向更复杂的理解。老人和光鲜客户可作为后续伏笔。
canon_risks:
  - 父亲价格归零不能解释为死亡或生命倒计时，必须保持存活状态
  - 标签消失机制不能等同于寿命耗尽，需保持悬疑
  - 不能暗示林砚有能力逆转父亲的归零状态
canon_sync:
  synced: true