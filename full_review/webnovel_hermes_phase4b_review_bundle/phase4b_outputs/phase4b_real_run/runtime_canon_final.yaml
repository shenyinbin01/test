project:
  title: 人生价格标签
  genre:
  - 都市异能
  - 现实爽文
  - 悬疑成长
protagonist:
  name: 林砚
  age: 24
  identity: 外卖员
  status:
    money_pressure: true
    father_ill: true
    ability_awakened: true
    understands_label: false
  ability:
    name: 人生价格标签
    known_rules:
    - 标签不是单纯财富
    - 标签不是生命倒计时
    - 标签不是寿命数值
    - 标签不是系统面板
    - 标签代表当前人生价值、潜力、风险、选择代价的综合显影
    - 标签会随选择、情绪、关系和关键事件变化
    limits:
    - 只显示当前状态，不显示完整未来
    - 标签会误导，必须结合现实判断
    - 强行窥探会头痛或短暂失明
    - 标签变化不等于命运确定
characters:
- id: lin_yan
  name: 林砚
  role: 主角
  current_state: 被债务和父亲病情压迫，刚觉醒能力
