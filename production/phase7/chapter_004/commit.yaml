chapter_id: 4
title: 标签在闪烁
summary: 林砚通过主动测试发现标签在奖励自我牺牲、惩罚违规行为。老人捡猫涨了标签但猫没有标签。光鲜客户的丈夫也能看到标签已崩溃。章尾收到5000元望江路转账，标签剧烈闪烁，林砚选择接受。
confirmed_events:
- 林砚发现自己标签从382降到369（过夜掉13）
- 测试发现不买茶叶蛋标签降1（自我牺牲相关）
- 老人捡流浪猫标签涨1.2万，猫头顶没有标签
- 帮新人说话、送水——标签没变
- 决定多跑两单——标签涨2（从368到370）
- 闯红灯——标签暴跌15（从370到355）
- 光鲜客户丈夫也能看到标签，已自我封闭
- 收到5000元转账，备注"望江路"
- 标签在转账后剧烈闪烁（248和0之间跳）
- 林砚选择保留这笔钱
