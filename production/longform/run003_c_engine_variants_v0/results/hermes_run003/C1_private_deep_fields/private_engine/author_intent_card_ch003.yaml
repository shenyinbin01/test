chapter: "003"
author_intent_card:
  scene_purpose: >
    Gate_03 is the final assessment. Lin Yan must secure advancement while
    the accumulated trust debt comes due. He passes — but the cost is
    visibly paid in relationship coin and institutional exposure. The
    advancement is real but not clean. The reader question remains
    partially open.
  reader_experience_target:
    primary: >
      Reader feels the cost of Lin Yan's choices land. The advancement is
      earned but shadowed. Relief is mixed with unease. The partnership
      survived functionally but not emotionally — a more interesting outcome
      than either clean repair or total break.
    secondary: >
      The reader question ("Which signal is being misread?") receives partial
      answer — enough to feel satisfying, not enough to close the story.
  emotional_arc: pressure → cost acknowledgment → non-clean resolution
  what_must_land:
    - Final gate pressure is acute; advancement is at stake.
    - Lin Yan uses a flawed tactic — something partially effective but costly.
    - The relationship debt becomes visible to both parties (though not fully discussed).
    - Reader question receives partial, earned answer.
    - Advancement is granted but with lingering friction.
  what_must_avoid:
    - Total victory or clean resolution.
    - Report-style ending that summarizes.
    - Relationship fully repaired.
    - All questions answered.
  compression_ratio: "3:1"
  decompression_markers:
    - A gesture from Su Tang that means more than it says
    - Sensory detail that marks the cost without stating it
    - A final image that opens into next friction rather than closing
