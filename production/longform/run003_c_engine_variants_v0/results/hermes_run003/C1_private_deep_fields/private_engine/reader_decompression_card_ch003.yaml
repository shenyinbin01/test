chapter: "003"
reader_decompression_card:
  tension_buildup_summary: >
    All three gates' accumulated pressure converges in the final panel.
    Reader has watched three chapters of compounding silence and now sees
    the institutional reckoning — not a catastrophe, but a soft flag.
    Advancement comes with an asterisk. The partnership survives in form
    but not in spirit. Reader gets partial closure with an open door.
  decompression_strategy:
    type: "earned_partial_release"
    mechanism: >
      Provide enough resolution — advancement is confirmed — that reader
      can exhale. But withhold full emotional closure. The relationship
      question stays open. The informal signal's full truth stays open.
      This is decompression with a hook, not an ending.
  relief_moments:
    - "Results read: 'Lin Yan, Su Tang — advancement approved.'"
    - "Amber light on the table: a sensory anchor for release."
    - "Lin Yan exhaling: the body releasing what the mind hasn't processed."
    - "Su Tang's nod: small, real, insufficient, true."
  lingering_question_cultivation:
    question: "Which signal was misread — and what will the withheld truth cost next?"
    why_it_works: >
      The original reader question is not fully answered — it has evolved.
      Reader now understands the cost of the first misread but doesn't know
      whether it will be repaired or compound further. This is the right
      amount of closure for a series entry.
