book_spine_id: run003_unified_book_spine
schema_version: "0.1"
premise: A candidate in a constrained advancement assessment learns that passing the gates is less dangerous than preserving trust while choosing under incomplete information.
central_engine_question: Can a C Engine make choices feel like lived pressure rather than engineering compliance?
longform_promise:
  - advancement through traceable cost
  - relationship debt that changes future options
  - information asymmetry that readers can infer before characters resolve it
  - webnovel propulsion without report-like explanations
mainline:
  start: protagonist enters a local three-gate assessment with a hidden information disadvantage
  middle: prior choices damage ally trust and restrict available tactics
  end: protagonist advances only with an inherited cost and a next-friction seed
non_goals:
  - complete arc resolution
  - clean victory
  - formal ledger acceptance
  - author-style imitation
