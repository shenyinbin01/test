# chapter_fact_audit_report.schema.yaml
# 老板可审计的逐章事实汇总

type: object
required:
  - book_id
  - title
  - chapter_count
  - chapters_audited
  - chapters
  - hook_payoff_summary
  - reader_debt_summary
  - items_for_review
fields:
  book_id:
    type: string
  title:
    type: string
  chapter_count:
    type: integer
  chapters_audited:
    type: integer
  missing_chapters:
    type: array
    items:
      type: integer
  low_confidence_chapters:
    type: array
    items:
      type: integer
  anomalous_chapters:
    type: array
    items:
      type: object
      fields:
        chapter: type: integer
        reason: type: string
  chapters:
    type: array
    items:
      type: object
      required:
        - chapter
        - title
        - one_sentence
        - chapter_function
        - protagonist_state_change
        - main_characters
        - confidence
      fields:
        chapter: type: integer
        title: type: string
        one_sentence: type: string
        chapter_function: type: string
        protagonist_state_change: type: string
        main_characters: type: array
        hooks_opened: type: array
        hooks_paid: type: array
        debts_opened: type: array
        debts_paid: type: array
        ending_pull: type: string
        evidence_count: type: integer
        confidence: type: string
  hook_payoff_summary:
    type: object
    fields:
      total_hooks_opened: type: integer
      total_hooks_paid: type: integer
      unresolved_hooks: type: array
  reader_debt_summary:
    type: object
    fields:
      total_debts_opened: type: integer
      total_debts_paid: type: integer
      open_debts: type: array
  items_for_review:
    type: array
    items:
      type: object
      fields:
        chapter: type: integer
        issue: type: string
        severity: type: string
