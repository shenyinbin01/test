    misread_or_withholding: 众人以为“不走”只是旁观真相，元启把它定义为同意检测；苏衍隐瞒枯竭提前的原因。
    exposure_cost: 留下的人被标记；想走的人失去退出机会；苏衍的曲线被展示。
    inherited_cost: C4 复检隐瞒、白签、柳青砚失望、阵眼活性被抽走。
    new_cost: 苏衍被群体看见异常曲线，且默认旁人被卷入检测。
    next_chapter_friction: 群体会把苏衍视为异类或诱因，柳青砚更难接受他的沉默。
    human_aftertaste_beat: 规则公布后，苏衍记住的不是镜面，而是那个杂役被攥皱又松不开的袖口。
