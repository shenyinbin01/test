    scene_life_function: 演武场从复检场变成强制选择现场，弟子们在同门眼光下决定是否保留积分。
    scene_resistance: 镜前空地、队列、袖子被拉住、谁先走的目光压力让退出几乎不可能。
    non_instrumental_detail: 想离开的杂役袖口被同伴攥皱，古镜前地面还留着昨日复检红签的红蜡痕。
