revelation_progress:
  triggered: true
  description: "通过碎片化+物证+误读逐步揭示矿洞异常"

scenes:
  - order: 1
    title: "粥里的东西"
    narrative_function: hook
    pov: "苏衍"
    location: "宗门饭堂杂役区"
    emotion_target: "警觉、被勾起"
    conflict_type: "人与系统"
    dialogue_ratio: 0.4
    length: 300
    key_lines:
      - "苏衍在饭堂角落听见两个杂役在低声谈论后山一个被封锁的地方——但他们不敢说出具体名字"
      - "'进去过的人出来以后好几天没下床。管事的不让提'"

  - order: 2
    title: "借牌"
    narrative_function: build
    pov: "苏衍"
    location: "杂役区→后山小径"
    emotion_target: "冒险前的计算"
    conflict_type: "人与系统"
    dialogue_ratio: 0.3
    length: 350
    key_lines:
      - "苏衍向看火杂役借后山送柴牌——明天替他值夜班"
      - "从废弃药田绕过后山巡查点，路上发现禁入木牌被人推到一边"

  - order: 3
    title: "裂缝"
    narrative_function: build
    pov: "苏衍"
    location: "后山矿洞入口"
    emotion_target: "发现异常的不安"
    conflict_type: "人与系统"
    dialogue_ratio: 0.0
    length: 300
    key_lines:
      - "石壁裂缝透出微弱金色残光——但这光跟上次在演武场看到的金线颜色不同"
      - "裂缝外碎石路上有被扫过的痕迹——不是自然风化，是有人刻意清理过脚印"

  - order: 4
    title: "阵眼"
    narrative_function: climax
    pov: "苏衍"
    location: "矿洞深处阵眼前"
    emotion_target: "震撼"
    conflict_type: "人与系统"
    dialogue_ratio: 0.2
    length: 400
    key_lines:
      - "洞壁符文分层：最外层最旧，中层刻痕深，内层刻痕浅——像最后一批扩建是赶工的"
      - "阵眼边缘有维护标记，最晚的日期是二十年前"
      - "触碰残光→碎片化情绪涌入→抓住白发老人汇报画面：'枯竭周期将到达最低点——需打开第二轮筛选'"

  - order: 5
    title: "出洞"
    narrative_function: release
    pov: "苏衍"
    location: "矿洞外→杂役区"
    emotion_target: "负担加重"
    conflict_type: "人与系统"
    dialogue_ratio: 0.1
    length: 250
    key_lines:
      - "天黑点名在即，苏衍匆匆赶回，但送柴牌上的油污可能暴露他去了不该去的地方"
      - "体内情绪碎片翻涌——明天复检他需要同时藏住积分来源和这些不属于他的情绪"

climax:
  scene_index: 4
  payoff: "发现枯竭是设计而非事故"

cliffhanger: "替班债、后山痕迹、双重异常——三重压力叠加复检"

# --- Human Texture block (实验 v0) ---
human_texture:
  focus_fields:
    - information_carrier
    - scene_resistance
    - consequence_next_friction

  private_want: ""
  shame_or_avoidance: ""
  relationship_debt_change: ""

  scene_resistance: "饭堂不是信息公告板——稀粥、木屏风、分区的等级制度迫使信息只能偷听和含混传播；后山不是开放式地图——禁入木牌、天黑点名、送柴牌制度限制苏衍的行动窗口；矿洞内部——窄裂缝、黑暗、符文残光的不规则分布让信息获取需要体力代价而非一键读取"

  information_carrier: "矿洞信息通过三层露出：①老杂役的含混闲谈（'好几天没下床'→不敢说出具体名字→用身体后果代替系统描述）；②物证（凿痕年代层次→符文刻痕深浅对比→阵眼维护标记的日期断档→脚印被清理的痕迹→残光颜色与金线不同）；③记忆碎片（白发老人汇报→作为最终确认，但读者已从物证推理出大部分结论）"

  consequence_next_friction: "苏衍获取信息的具体代价：①欠看火杂役一个夜班（具体债务，可被催讨）；②后山行踪痕迹——禁入木牌被移动、碎石路上新脚印、送柴牌上的油污可被追溯；③体内积分暴涨+情绪碎片——复检压力从'藏金线'升级为'藏双重异常'"

  carry_forward:
    relationship_debt: []
    consequence:
      - "替班债可在下一章被催讨，限制苏衍的行动自由"
      - "后山痕迹可被执事或巡查弟子注意"
      - "双重异常使复检风险翻倍"
