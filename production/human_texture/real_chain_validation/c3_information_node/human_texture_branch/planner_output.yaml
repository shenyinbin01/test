  scene_resistance: "饭堂不是信息公告板——是稀粥、木屏风、分区的制度空间；后山不是开放式地图——是荒药田、封路木牌、天黑点名、送柴牌制度。每个信息节点都必须被物理和制度阻力包裹"

  information_carrier: "矿洞信息通过三层载体露出：①老杂役的含混闲谈（被正式弟子听见的风险→压低声量→信息碎片化）；②送柴牌+看火杂役的私心（制度缝隙→苏衍借到后山通行权）；③石壁旧刻痕+阵眼维护标记（物证→苏衍从日期规律拼出枯竭周期）。不依赖旁白说明或权威人物直接告知"

  consequence_next_friction: "苏衍获取信息的代价：①欠看火杂役一顿替换班（饭钱或体力债务）；②留下后山行踪痕迹（天黑前点名可能暴露缺勤）；③积分和情绪碎片双暴涨（加重复检压力）。这些代价必须进入下一章"

  carry_forward:
    relationship_debt:
      - "苏衍欠看火杂役的替班债——下一章如被催讨可能影响他的行动自由"
    consequence:
      - "后山行踪痕迹：封路木牌被移动过、碎石路上的新脚印——执事或巡查弟子可能注意到"
      - "积分暴涨+情绪碎片：复检压力从'藏金线秘密'升级为'藏积分和情绪双重异常'"
